stages:
  - build
  - test
  - deploy
  - release

include:
  - component: $CI_SERVER_FQDN/components/ai-catalog/sync@0.0.10

build-job:
  stage: build
  image: node:20-alpine
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/

unit-test-job:
  stage: test
  image: node:20-alpine
  script:
    - echo "Running unit tests..."
    - npm ci
    - npm test

lint-test-job:
  stage: test
  image: node:20-alpine
  script:
    - echo "Linting code..."
    - npm ci
    - npm run lint || echo "Lint skipped or not configured"

deploy-job:
  stage: deploy
  image: google/cloud-sdk:alpine
  environment: production
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
  script:
    - echo "Deploying application to Google Cloud Run..."
    # Authenticate with Google Cloud using a CI/CD Variable
    - echo "$GCP_SERVICE_ACCOUNT_KEY" > gcp-key.json
    - gcloud auth activate-service-account --key-file gcp-key.json
    - gcloud config set project $GCP_PROJECT_ID
    # Deploy directly from source using Cloud Buildpacks
    - gcloud run deploy gitflow-ai --source . --region us-west1 --allow-unauthenticated --project $GCP_PROJECT_ID
    - echo "Application successfully deployed to https://gitflow-ai-836641670384.us-west1.run.app/"
